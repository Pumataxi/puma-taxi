apply plugin: "com.android.application"
apply plugin: "com.facebook.react"
apply plugin: "org.jetbrains.kotlin.android"

/**
 * Конфигурация React Native
 */
react {
    /* Автоматически подхватывает настройки из node_modules */
}

def jscFlavor = 'org.webkit:android-jsc:+'

android {
    // Используем общие настройки из корневого файла
    ndkVersion rootProject.ext.ndkVersion
    compileSdkVersion rootProject.ext.compileSdkVersion
    namespace "com.pumataxi"

    defaultConfig {
        applicationId "com.pumataxi"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug // Временно для тестов используем дебаг-ключ
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // Ядро React Native
    implementation("com.facebook.react:react-android")

    // Поддержка движка (Hermes или JSC)
    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }

    // Твоя рабочая база - Appwrite
    // implementation("io.appwrite:sdk-for-android:1.1.0")
}

