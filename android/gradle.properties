# Этот файл настраивает поведение Gradle
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
org.gradle.parallel=true
org.gradle.configureondemand=true

# Включаем поддержку AndroidX (нужно для Appwrite и новых библиотек)
android.useAndroidX=true
android.enableJetifier=true

# Включаем движок Hermes для скорости работы приложения
hermesEnabled=true

# Настройки для React Native
VERSION_NAME=1.0
VERSION_CODE=1
