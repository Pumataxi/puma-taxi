name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Build APK
      run: |
        cd android
        # Устанавливаем системный gradle, чтобы не искать файлы, которых нет
        sudo apt-get update && sudo apt-get install gradle -y
        # Генерируем wrapper прямо на сервере
        gradle wrapper
        chmod +x gradlew
        # Запускаем сборку
        ./gradlew assembleRelease --stacktrace
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: puma-taxi-apk
        path: "android/app/build/outputs/apk/release/*.apk"
