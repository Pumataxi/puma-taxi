name: Build Android APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Это добавит кнопку ручного запуска

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Force Build with System Gradle
        run: |
          cd android
          sudo apt-get update && sudo apt-get install gradle -y
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: puma-taxi-apk
          path: "android/app/build/outputs/apk/release/*.apk"
