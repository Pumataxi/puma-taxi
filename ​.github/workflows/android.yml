name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Force Gradle Setup and Build
      run: |
        cd android
        # Устанавливаем сам Gradle в систему Гитхаба, раз в проекте его нет
        sudo apt-get install gradle -y
        # Генерируем враппер (теперь он точно создаст jar в памяти робота)
        gradle wrapper
        chmod +x gradlew
        # Поехали собирать!
        ./gradlew assembleRelease
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: puma-taxi-apk
        path: "**/build/outputs/apk/release/*.apk"
