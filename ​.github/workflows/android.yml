name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Build APK without Wrapper
      run: |
        cd android
        # Устанавливаем системный gradle, чтобы не зависеть от твоего проекта
        sudo apt-get update
        sudo apt-get install gradle -y
        # Запускаем сборку через системный gradle
        gradle assembleRelease --stacktrace
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: puma-taxi-apk
        path: "**/build/outputs/apk/release/*.apk"
