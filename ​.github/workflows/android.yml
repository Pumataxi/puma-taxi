name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        
    - name: Find and Make gradlew executable
      run: |
        find . -name "gradlew" -exec chmod +x {} +
        echo "Gradlew found and unlocked"

    - name: Build APK
      run: |
        if [ -d "Android" ]; then cd Android; elif [ -d "android" ]; then cd android; fi
        ./gradlew assembleRelease
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: puma-taxi-apk
        path: "**/build/outputs/apk/release/*.apk"
