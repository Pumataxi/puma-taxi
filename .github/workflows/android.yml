name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: 🚨 Nuclear Key & Gradle Fix
        run: |
          # 1. Исправляем структуру Gradle
          mkdir -p android/gradle/wrapper
          curl -L https://raw.githubusercontent.com/gradle/gradle/v7.6.1/gradle/wrapper/gradle-wrapper.jar -o android/gradle/wrapper/gradle-wrapper.jar
          curl -L https://raw.githubusercontent.com/gradle/gradle/v7.6.1/gradlew -o android/gradlew
          chmod +x android/gradlew
          
          # 2. УНИЧТОЖАЕМ все следы старых ключей в памяти
          find android -name "*.keystore" -type f -delete
          
          # 3. Создаем абсолютно чистый ключ
          keytool -genkey -v -keystore android/app/fresh_build.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Build Android APK
        run: |
          cd android
          # Мы принудительно пробрасываем путь к НОВОМУ ключу, игнорируя настройки проекта
          ./gradlew clean assembleRelease \
            -Pandroid.injected.signing.store.file=fresh_build.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=androiddebugkey \
            -Pandroid.injected.signing.key.password=android \
            --stacktrace --no-daemon
        env:
          JAVA_OPTS: "-Xmx2048m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: puma-taxi-release
          path: android/app/build/outputs/apk/release/*.apk
