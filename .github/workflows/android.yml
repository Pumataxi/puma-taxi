name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Фикс для корректной работы Node.js в экшенах
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        # Используем --legacy-peer-deps для обхода конфликтов старых библиотек
        run: npm install --legacy-peer-deps

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 7.6.1

      - name: Restore Gradle Wrapper JAR
        # КРИТИЧЕСКИЙ ШАГ: Если твой .jar файл в папке android сломан или пуст,
        # эта команда скачает настоящий рабочий бинарник напрямую из Gradle.
        run: |
          mkdir -p android/gradle/wrapper
          curl -L https://raw.githubusercontent.com/gradle/gradle/v7.6.1/gradle/wrapper/gradle-wrapper.jar -o android/gradle/wrapper/gradle-wrapper.jar

      - name: Build Android APK
        # Запускаем сборку из КОРНЯ, чтобы Metro видел index.js
        run: |
          chmod +x android/gradlew
          ./android/gradlew -p android assembleRelease --stacktrace --no-daemon
        env:
          JAVA_OPTS: "-Xmx2048m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: puma-taxi-release
          path: android/app/build/outputs/apk/release/*.apk
