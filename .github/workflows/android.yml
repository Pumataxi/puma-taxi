name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 7.6.1

      - name: Recreate Gradle Wrapper (The Fix)
        # Если папка или файл отсутствуют, этот шаг создаст их с нуля
        run: |
          mkdir -p android/gradle/wrapper
          curl -L https://raw.githubusercontent.com/gradle/gradle/v7.6.1/gradle/wrapper/gradle-wrapper.jar -o android/gradle/wrapper/gradle-wrapper.jar
          # Проверяем, что файл скачался и имеет размер (не пустой)
          ls -lh android/gradle/wrapper/

      - name: Build Android APK
        # Теперь запускаем сборку. Флаг -p android скажет Gradle зайти в нужную папку
        run: |
          chmod +x android/gradlew
          ./android/gradlew -p android assembleRelease --stacktrace --no-daemon
        env:
          JAVA_OPTS: "-Xmx2048m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: puma-taxi-release
          path: android/app/build/outputs/apk/release/*.apk
