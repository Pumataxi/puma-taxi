name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Фикс для корректной работы Node.js в облаке GitHub
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        # Устанавливаем JS-зависимости перед сборкой натива
        run: npm install --legacy-peer-deps

      - name: Build Android APK
        # Заходим в папку android, даем права и запускаем наш исправленный воркер
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace --no-daemon
        env:
          JAVA_OPTS: "-Xmx2048m"

      - name: Upload APK
        # Сохраняем готовый файл, чтобы ты мог его скачать
        uses: actions/upload-artifact@v4
        with:
          name: puma-taxi-release
          path: android/app/build/outputs/apk/release/*.apk
