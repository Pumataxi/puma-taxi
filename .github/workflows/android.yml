name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Manual Gradle Setup
        # Скачиваем Gradle 8.5 вручную и создаем локальный Wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          # Используем распакованный gradle для генерации wrapper внутри проекта
          ./gradle-8.5/bin/gradle wrapper --gradle-version 8.5 --project-dir android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          # Запускаем строго локальный ./gradlew (версии 8.5)
          ./gradlew clean assembleRelease --stacktrace
        env:
          JAVA_OPTS: "-Xmx2048m"
          GRADLE_OPTS: "-Dorg.gradle.java.home=$JAVA_HOME"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: puma-taxi-release
          path: android/app/build/outputs/apk/release/*.apk
