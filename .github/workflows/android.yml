name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Manual Gradle Setup
        # Мы сами скачиваем Gradle 8.5, чтобы GitHub не подсовывал нам нерабочую версию 9.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          ./gradle-8.5/bin/gradle wrapper --gradle-version 8.5 --project-dir android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          # Делаем полную очистку перед сборкой, чтобы убрать конфликты метаданных
          ./gradlew clean assembleRelease --stacktrace
        env:
          JAVA_OPTS: "-Xmx2048m"
          # Сообщаем компилятору Kotlin использовать установленную Java 17
          GRADLE_OPTS: "-Dorg.gradle.java.home=$JAVA_HOME"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: puma-taxi-release
          path: android/app/build/outputs/apk/release/*.apk
