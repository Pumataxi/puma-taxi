name: Build Android APK & Appwrite Setup

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: 🚨 Gradle Fix
        run: |
          mkdir -p android/gradle/wrapper
          curl -L https://raw.githubusercontent.com/gradle/gradle/v7.6.1/gradle/wrapper/gradle-wrapper.jar -o android/gradle/wrapper/gradle-wrapper.jar
          curl -L https://raw.githubusercontent.com/gradle/gradle/v7.6.1/gradlew -o android/gradlew
          chmod +x android/gradlew

      - name: 🔑 Generate & Extract SHA-1 Key
        run: |
          # Создаем ключ прямо в папке android проекта, где его ищет Gradle
          keytool -genkey -v -keystore android/debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          
          echo "--- ТВОЙ SHA-1 КЛЮЧ НИЖЕ (КОПИРУЙ В APPWRITE) ---"
          keytool -list -v -keystore android/debug.keystore -alias androiddebugkey -storepass android -keypass android | grep SHA1
          echo "--- КОНЕЦ КЛЮЧА ---"

      - name: Build Android APK
        run: |
          cd android
          # Собираем релизную версию
          ./gradlew clean assembleRelease -x validateSigningRelease --no-daemon
        env:
          JAVA_OPTS: "-Xmx2048m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: puma-taxi-release
          path: android/app/build/outputs/apk/release/*.apk
