name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Фикс для корректной работы Node.js в окружении GitHub Actions
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        # Используем --legacy-peer-deps, чтобы избежать конфликтов версий в React Native
        run: npm install --legacy-peer-deps

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 7.6.1

      - name: Force Fix Wrapper
        # Если .jar файл пропал из репозитория, скачиваем его напрямую.
        # Это лечит ошибку "Could not find or load main class org.gradle.wrapper.GradleWrapperMain"
        run: |
          mkdir -p android/gradle/wrapper
          curl -L https://raw.githubusercontent.com/gradle/gradle/v7.6.1/gradle/wrapper/gradle-wrapper.jar -o android/gradle/wrapper/gradle-wrapper.jar

      - name: Build Android APK
        # ВАЖНО: Запускаем из КОРНЯ проекта, указывая путь к gradlew.
        # Это позволяет React Native автоматически найти index.js без лишних настроек.
        run: |
          chmod +x android/gradlew
          ./android/gradlew -p android assembleRelease --stacktrace --no-daemon
        env:
          JAVA_OPTS: "-Xmx2048m"

      - name: Upload APK
        # После успешной сборки файл появится в разделе Artifacts в GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: puma-taxi-release
          path: android/app/build/outputs/apk/release/*.apk
