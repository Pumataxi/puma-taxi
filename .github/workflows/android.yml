name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: 🚨 Absolute Clean & Key Gen
        run: |
          # 1. Исправляем Gradle
          mkdir -p android/gradle/wrapper
          curl -L https://raw.githubusercontent.com/gradle/gradle/v7.6.1/gradle/wrapper/gradle-wrapper.jar -o android/gradle/wrapper/gradle-wrapper.jar
          curl -L https://raw.githubusercontent.com/gradle/gradle/v7.6.1/gradlew -o android/gradlew
          chmod +x android/gradlew
          
          # 2. Генерируем новый ключ с АБСОЛЮТНО другим именем
          keytool -genkey -v -keystore android/app/super_puma.jks -storepass pumataxi -alias puma_alias -keypass pumataxi -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Puma,O=Taxi,C=RU"

      - name: Build Android APK
        run: |
          cd android
          # Насильно прописываем параметры нового ключа в команду сборки
          ./gradlew clean assembleRelease \
            -Pandroid.injected.signing.store.file=super_puma.jks \
            -Pandroid.injected.signing.store.password=pumataxi \
            -Pandroid.injected.signing.key.alias=puma_alias \
            -Pandroid.injected.signing.key.password=pumataxi \
            --stacktrace --no-daemon
        env:
          JAVA_OPTS: "-Xmx2048m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: puma-taxi-release
          path: android/app/build/outputs/apk/release/*.apk
