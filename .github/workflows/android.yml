name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install --force

      # Создаем структуру папок, чтобы Metro не вылетал
      - name: Create Assets Folder
        run: mkdir -p android/app/src/main/assets

      - name: Generate Bundle
        run: npx react-native bundle --platform android --dev false --entry-file App.tsx --bundle-output android/app/src/main/assets/index.android.bundle

      - name: Generate Gradle Wrapper
        run: cd android && gradle wrapper --gradle-version 8.0.2
        
      - name: Make gradlew executable
        run: chmod +x gradlew
        working-directory: android

      - name: Build with Gradle
        run: ./gradlew assembleDebug --stacktrace
        working-directory: android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pumataxi-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
